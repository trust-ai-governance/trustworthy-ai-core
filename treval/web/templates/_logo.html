{# The brand mark — ONE definition, included by every page's banner.

   It used to be inlined in registry.html only; EV-W2's base.html re-invented it as a
   placeholder "◆" and the pages drifted apart on the very first try. Included, they
   cannot. #}
<span class="logo" aria-hidden="true">
  <svg viewBox="0 0 92 60" width="{{ w | default(48) }}" height="{{ h | default(31) }}"
       fill="currentColor" role="img" aria-label="treval logo">
    <!-- "<" chevron — 5 modules stacked top → bottom -->
    <rect x="24.75" y="0.75"  width="10.5" height="10.5" rx="2.2"/>
    <rect x="12.75" y="12.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="0.75"  y="24.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="12.75" y="36.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="24.75" y="48.75" width="10.5" height="10.5" rx="2.2"/>
    <!-- "口" hollow square — 12-module 4×4 ring, height-matched to "<" -->
    <rect x="45" y="6.75"  width="10.5" height="10.5" rx="2.2"/>
    <rect x="57" y="6.75"  width="10.5" height="10.5" rx="2.2"/>
    <rect x="69" y="6.75"  width="10.5" height="10.5" rx="2.2"/>
    <rect x="81" y="6.75"  width="10.5" height="10.5" rx="2.2"/>
    <rect x="45" y="18.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="81" y="18.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="45" y="30.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="81" y="30.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="45" y="42.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="57" y="42.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="69" y="42.75" width="10.5" height="10.5" rx="2.2"/>
    <rect x="81" y="42.75" width="10.5" height="10.5" rx="2.2"/>
  </svg>
</span>
