# CI — trustworthy-ai-core 仓库
#
# 改编自 platform 仓 CI。差异：
#  - 移除 ir-spec 短期 token / git insteadOf 步骤：core 的 WAL 工具自包含、
#    零第三方依赖、不依赖生成的 proto，因此无需拉取 spec 仓。
#  - 保留协议铁律的 license / 漏洞双扫描（宪法第 1 章），即便当前无第三方依赖
#    也常驻，未来引入依赖时立即生效。
#  - 覆盖率门槛沿用 60%（宪法 13.3）。

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov bandit pip-audit pip-licenses
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Detect Python sources
        id: detect
        run: |
          if find . -name '*.py' -not -path './.*' | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python sources yet. Code checks skipped."
          fi

      - name: Lint with Ruff
        if: steps.detect.outputs.has_py == 'true'
        run: ruff check .

      - name: Check formatting with Ruff
        if: steps.detect.outputs.has_py == 'true'
        run: ruff format --check .

      - name: Type check with mypy
        if: steps.detect.outputs.has_py == 'true'
        run: mypy tools

      - name: Test with pytest
        if: steps.detect.outputs.has_py == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d tests ] || find . -name 'test_*.py' -not -path './.*' | grep -q .; then
            pytest tests/ --cov=tools --cov-report=xml --cov-report=term-missing --cov-fail-under=60
          else
            echo "::notice::No tests yet. pytest skipped."
          fi

      - name: Security scan with Bandit
        if: steps.detect.outputs.has_py == 'true'
        run: bandit -r tools

      - name: Vulnerability scan with pip-audit
        run: pip-audit || true

      - name: License compliance check
        run: |
          FORBIDDEN="GPL|LGPL|AGPL|SSPL|GNU GENERAL PUBLIC|GNU LESSER|GNU AFFERO|SERVER SIDE PUBLIC"
          echo "Installed packages and licenses:"
          pip-licenses --format=plain --with-system
          pip-licenses --format=json --with-system > licenses.json
          VIOLATIONS=$(python - <<'EOF'
          import json, re
          forbidden = re.compile(r"GPL|LGPL|AGPL|SSPL|GNU GENERAL PUBLIC|GNU LESSER|GNU AFFERO|SERVER SIDE PUBLIC", re.I)
          self_pkg = re.compile(r"trustworthy-ai", re.I)
          bad = []
          for pkg in json.load(open("licenses.json")):
              if self_pkg.search(pkg.get("Name", "")):
                  continue
              if forbidden.search(pkg.get("License", "")):
                  bad.append(f"{pkg.get('Name','')}: {pkg.get('License','')}")
          if bad:
              print("\n".join(bad))
          EOF
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Forbidden copyleft license detected (charter ch.1):"
            echo "$VIOLATIONS"
            exit 1
          else
            echo "License compliance check passed."
          fi